# Each rule's `when` block is AND-combined across whichever fields are set.
# `id` must be unique -- it's the key used for cooldown/edge-tracking state.
#
# Anti-spam: use `fire_once_per_threshold_crossing: true` for conditions that stay true for a
# while (HP thresholds, being in a zone) so the alert fires once per crossing, not every tick.
# Use `cooldown_seconds` for conditions that can legitimately repeat (telegraph text).
#
# Rules edited in the in-app Rule Builder are saved here. This file ships with the tool and
# survives rebuilds, so rules kept here are permanent.

rules:
  # Real, verified rule (Nulgath the Archfiend): the boss sends its telegraph text as a
  # packet, so message_contains matches it. boss_name narrows it to this fight.
  - id: Nulgie
    when:
      boss_name: "Nulgath the Archfiend"
      message_contains: "Behold the power of the Abyss!"
    then:
      alert: "LoO - Taunt Nulgath"
      level: critical
    cooldown_seconds: 5

  # Legion Revenant taunt: rotational, not event-driven. Timer mode -- once the boss is
  # present (fight start), remind after 5s, then every time the taunt scroll (skill 6) is
  # back up. SET repeat_every_seconds to your actual skill-6 cooldown.
  - id: LR_taunt
    when:
      boss_name: "Nulgath the Archfiend"
    then:
      alert: "LR - Taunt (skill 6)"
      level: warning
    initial_delay_seconds: 5
    repeat_every_seconds: 12   # TODO: set to the real taunt-scroll cooldown

  # --- format examples (placeholder boss names; edit or delete freely) ---
  - id: example_telegraph_dodge
    when:
      message_contains: "incoming fire"
    then:
      alert: "Dodge now!"
      level: critical
    cooldown_seconds: 5

  - id: example_entered_boss_room
    when:
      zone_equals: "Dage's Chamber"
    then:
      alert: "Boss room entered"
      level: info
    fire_once_per_threshold_crossing: true

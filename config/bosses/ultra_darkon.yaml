# Ultra Darkon starter pack.
#
# The HSV values and message texts below are UNCALIBRATED placeholders -- run the workflow in
# _TEMPLATE.yaml against your own client before trusting these alerts. Screen text (OCR) and
# glow colors vary with client size and quality settings.

boss: Ultra Darkon

# min_coverage_pct is parked HIGH on purpose until calibrated: cues are not zone-gated, so a
# low threshold fires false alerts during unrelated fights (live test 2026-07-04 measured
# ordinary gold UI/effects at 4.3% coverage in the Escherion room). Calibrate with
# vision_probe --watch inside the actual Darkon fight, then lower these.
cues:
  - id: red_glow
    hsv_lower: [170, 130, 160]
    hsv_upper: [10, 255, 255]
    min_coverage_pct: 10.0
    region: [0.05, 0.30, 0.95, 0.95]

  - id: gold_glow
    hsv_lower: [20, 120, 170]
    hsv_upper: [35, 255, 255]
    min_coverage_pct: 10.0
    region: [0.05, 0.30, 0.95, 0.95]

rules:
  - id: dodge_red_glow
    when:
      visual_cue: red_glow
    then:
      alert: "Red telegraph — get out!"
      level: critical
    fire_once_per_threshold_crossing: true

  - id: gold_glow_note
    when:
      visual_cue: gold_glow
    then:
      alert: "Gold zone up — check positioning"
      level: warning
    fire_once_per_threshold_crossing: true

  - id: counter_attack_warning
    when:
      message_contains: "counter"    # catches "Counter Attack" from server text or OCR
    then:
      alert: "COUNTER — stop attacking!"
      level: critical
    cooldown_seconds: 6
